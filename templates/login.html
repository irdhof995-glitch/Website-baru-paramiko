<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NetMaster Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] flex items-center justify-center h-screen relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>

    <div class="w-full max-w-md p-8 relative z-10">
        <div class="text-center mb-12">
            <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white text-4xl mx-auto mb-6 shadow-2xl shadow-indigo-200 transform -rotate-6">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">NetMaster</h1>
            <p class="text-slate-400 mt-2 font-semibold uppercase tracking-[0.2em] text-[10px]">Premium Automation Engine</p>
        </div>
        
        <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-50">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="mb-6 p-4 bg-rose-50 text-rose-600 text-xs font-bold rounded-2xl border border-rose-100 flex items-center gap-3">
                    <i class="fas fa-triangle-exclamation"></i>
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST" class="space-y-8">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Administrator Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="text" name="username" class="w-full pl-14 pr-6 py-5 bg-slate-50 border border-slate-100 rounded-[1.5rem] font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Enter username" required>
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Security Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <input type="password" name="password" class="w-full pl-14 pr-6 py-5 bg-slate-50 border border-slate-100 rounded-[1.5rem] font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-[1.5rem] shadow-2xl shadow-indigo-100 transition-all transform hover:-translate-y-1 flex items-center justify-center gap-3">
                    Sign In
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>
        </div>
        <p class="text-center text-slate-400 mt-10 text-[10px] font-bold uppercase tracking-widest">
            &copy; 2026 NetMaster Engine &bull; v2.0.4
        </p>
    </div>
</body>
</html>
